# HAProxy TCP gateway for the Pangolin Basic WireGuard site.
#
# Pangolin WG-site resource targets must be IPs inside the site subnet (see
# CONTEXT.md). This proxy is what turns those tunnel IPs into cluster services:
# each service binds its own address in the WG subnet and is TCP-proxied to the
# service by its cluster DNS name, re-resolved live via CoreDNS. Kernel
# WireGuard does the crypto (full throughput); this is just an L4 splice.
#
# TO ADD A SERVICE: copy one `frontend` + one `backend` block, give it the next
# free WG-subnet IP, and create a matching Resource in Pangolin pointing at that
# IP:port. Nothing else — no iptables, no per-IP `ip addr`.
#
# HEALTH CHECKS: `mode tcp` means a backend only accepts a connection when its
# server passes the `check` below, so an unhealthy service refuses the socket.
# Turn on the Pangolin-side probe per target in the dashboard (Resource →
# Targets → health check); TCP is the uniform choice since it validates the
# whole tunnel→HAProxy→service chain without app-specific paths.
#
# IP MAP (site subnet 100.89.128.64/26; .64 is the pod itself):
#   .65 jellyfin        .66 sonarr        .67 radarr       .68 prowlarr
#   .69 qbittorrent     .70 seerr         .71 calibre      .72 audiobookshelf
#   .73 termix          .74 website       .75 argocd

global
    log stdout format raw local0 info
    maxconn 20000

defaults
    mode tcp
    log global
    option tcplog
    timeout connect 5s
    timeout client 1h      # long-lived media streams / websockets
    timeout server 1h
    timeout tunnel 1h

# Cluster DNS, so `svc.cluster.local` names are resolved (and re-resolved) at
# runtime — ClusterIP changes are picked up without editing this file.
resolvers coredns
    nameserver dns1 10.96.0.10:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 30s
    hold nx 5s
    hold timeout 5s
    hold refused 5s
    hold other 5s

# ─────────────────────────── services ───────────────────────────
# `transparent` lets HAProxy bind the tunnel IP even though it isn't assigned to
# an interface (needs NET_ADMIN); the wg container's postStart adds a `local`
# route for the whole site subnet so those packets are delivered to these sockets.

frontend jellyfin
    bind 100.89.128.65:8096 transparent
    default_backend jellyfin

backend jellyfin
    server jellyfin jellyfin.jellyfin.svc.cluster.local:8096 resolvers coredns init-addr none check

frontend sonarr
    bind 100.89.128.66:8989 transparent
    default_backend sonarr

backend sonarr
    server sonarr sonarr.sonarr.svc.cluster.local:8989 resolvers coredns init-addr none check

frontend radarr
    bind 100.89.128.67:7878 transparent
    default_backend radarr

backend radarr
    server radarr radarr.radarr.svc.cluster.local:7878 resolvers coredns init-addr none check

frontend prowlarr
    bind 100.89.128.68:9696 transparent
    default_backend prowlarr

backend prowlarr
    server prowlarr prowlarr.prowlarr.svc.cluster.local:9696 resolvers coredns init-addr none check

frontend qbittorrent
    bind 100.89.128.69:8080 transparent
    default_backend qbittorrent

backend qbittorrent
    server qbittorrent qbittorrent.qbittorrent.svc.cluster.local:8080 resolvers coredns init-addr none check

frontend seerr
    bind 100.89.128.70:80 transparent
    default_backend seerr

backend seerr
    server seerr seerr-seerr-chart.seerr.svc.cluster.local:80 resolvers coredns init-addr none check

frontend calibre
    bind 100.89.128.71:8080 transparent
    default_backend calibre

backend calibre
    server calibre calibre.calibre.svc.cluster.local:8080 resolvers coredns init-addr none check

frontend audiobookshelf
    bind 100.89.128.72:80 transparent
    default_backend audiobookshelf

backend audiobookshelf
    server audiobookshelf audiobookshelf.audiobookshelf.svc.cluster.local:80 resolvers coredns init-addr none check

frontend termix
    bind 100.89.128.73:8080 transparent
    default_backend termix

backend termix
    server termix termix.tools.svc.cluster.local:8080 resolvers coredns init-addr none check

# cronarch.com + www.cronarch.com both point here; HAProxy is L4 so the host
# header is irrelevant — it forwards either domain to the same backend.
frontend website
    bind 100.89.128.74:3000 transparent
    default_backend website

backend website
    server website website.website.svc.cluster.local:3000 resolvers coredns init-addr none check

frontend argocd
    bind 100.89.128.75:80 transparent
    default_backend argocd

backend argocd
    server argocd argocd-server.argocd.svc.cluster.local:80 resolvers coredns init-addr none check
