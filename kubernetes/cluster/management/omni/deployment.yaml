apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni
  namespace: omni-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: omni
  template:
    metadata:
      labels:
        app: omni
    spec:
      containers:
        - name: omni
          image: ghcr.io/siderolabs/omni:latest
          args:
            - "--account-id=homelab"
            - "--name=omni"
            - "--storage-default-kind=etcd"
            - "--storage-default-etcd-embedded=true"
            - "--storage-default-etcd-embedded-db-path=/data/etcd"
            - "--storage-default-etcd-private-key-source=file:///etc/omni/keys/omni.asc"
            - "--auth-initial-admins=caleb@cronarch.com"
          ports:
            - containerPort: 8080
              name: web
            - containerPort: 8081
              name: api
          volumeMounts:
            - name: data
              mountPath: /data
            - name: keys
              mountPath: /etc/omni/keys
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: omni-data
        - name: keys
          secret:
            secretName: omni-keys
