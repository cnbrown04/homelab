apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ffmpeg-transcode
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cnbrown04/homelab.git
    path: sisyphus/workloads/ffmpeg-transcode
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: ffmpeg-transcode
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
