apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: newt-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/cnbrown04/homelab.git
    path: sisyphus/workloads/newt/secrets
    targetRevision: HEAD
    plugin:
      name: sops-decrypt
  destination:
    server: https://kubernetes.default.svc
    namespace: newt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
