apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: newt
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/cnbrown04/homelab.git
      targetRevision: HEAD
      path: sisyphus/workloads/newt
    - repoURL: https://github.com/cnbrown04/homelab.git
      targetRevision: HEAD
      path: sisyphus/workloads/newt/secrets
      plugin:
        name: sops-decrypt
    - repoURL: https://charts.fossorial.io
      chart: newt
      targetRevision: 1.5.0
      helm:
        releaseName: newt
        valuesObject:
          global:
            image:
              tag: "1.14.0"
            # Use the kernel WireGuard interface instead of wireguard-go's
            # userspace netstack. Without this Newt runs as uid 65534 with all
            # capabilities dropped, silently falls back to userspace, and proxies
            # every byte of every service through a Go TCP/IP stack — measured at
            # ~32 Mbit/s per connection against a path that does 445-513 Mbit/s
            # direct. Requires a privileged container; see the newt namespace's
            # pod-security label.
            nativeMode:
              enabled: true
          newtInstances:
            - name: main-tunnel
              enabled: true
              acceptClients: true
              # The chart defaults to a 200m CPU limit, which throttled the tunnel
              # hard: stalls to zero for whole seconds with no packet loss. Raising
              # it removed the stalls and quadrupled per-connection throughput.
              resources:
                requests:
                  cpu: "200m"
                  memory: "256Mi"
                limits:
                  cpu: "2"
                  memory: "512Mi"
              auth:
                existingSecretName: newt-main-tunnel-auth
              # NOT `nativeMode:` here — that key doesn't exist at instance level
              # and Helm silently ignored it, which is why native mode never
              # actually engaged. The instance-level key is useNativeInterface.
              useNativeInterface: true
              configPersistence:
                enabled: true
                type: persistentVolumeClaim
                existingClaim: newt-config-pvc
                mountPath: /.config/newt-client
              generateAndSaveKeyTo: /.config/newt-client/private.key
              blueprintFile: /etc/newt/blueprint.yaml
              blueprintData: |
                public-resources:
                  jellyfin:
                    name: "Jellyfin"
                    mode: http
                    full-domain: jellyfin.calebbrown.dev
                    targets:
                      - hostname: jellyfin.jellyfin.svc.cluster.local
                        port: 8096
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: jellyfin.jellyfin.svc.cluster.local
                          port: 8096
                          path: /health
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  argocd:
                    name: "ArgoCD"
                    mode: http
                    full-domain: argocd.calebbrown.dev
                    targets:
                      - hostname: argocd-server.argocd.svc.cluster.local
                        port: 80
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: argocd-server.argocd.svc.cluster.local
                          port: 80
                          path: /healthz
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  sonarr:
                    name: "Sonarr"
                    mode: http
                    full-domain: sonarr.calebbrown.dev
                    targets:
                      - hostname: sonarr.sonarr.svc.cluster.local
                        port: 8989
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: sonarr.sonarr.svc.cluster.local
                          port: 8989
                          path: /ping
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  radarr:
                    name: "Radarr"
                    mode: http
                    full-domain: radarr.calebbrown.dev
                    targets:
                      - hostname: radarr.radarr.svc.cluster.local
                        port: 7878
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: radarr.radarr.svc.cluster.local
                          port: 7878
                          path: /ping
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  prowlarr:
                    name: "Prowlarr"
                    mode: http
                    full-domain: prowlarr.calebbrown.dev
                    targets:
                      - hostname: prowlarr.prowlarr.svc.cluster.local
                        port: 9696
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: prowlarr.prowlarr.svc.cluster.local
                          port: 9696
                          path: /ping
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  seerr:
                    name: "Seerr"
                    mode: http
                    full-domain: seerr.calebbrown.dev
                    targets:
                      - hostname: seerr-seerr-chart.seerr.svc.cluster.local
                        port: 80
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: seerr-seerr-chart.seerr.svc.cluster.local
                          port: 80
                          path: /api/v1/status
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  torrent:
                    name: "qBittorrent"
                    mode: http
                    full-domain: torrent.calebbrown.dev
                    targets:
                      - hostname: qbittorrent.qbittorrent.svc.cluster.local
                        port: 8080
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: qbittorrent.qbittorrent.svc.cluster.local
                          port: 8080
                          path: /
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  termix:
                    name: "Termix"
                    mode: http
                    full-domain: termix.calebbrown.dev
                    targets:
                      - hostname: termix.tools.svc.cluster.local
                        port: 8080
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: termix.tools.svc.cluster.local
                          port: 8080
                          path: /
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  cronarch:
                    name: "Cronarch Website"
                    mode: http
                    full-domain: cronarch.com
                    targets:
                      - hostname: website.website.svc.cluster.local
                        port: 3000
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: website.website.svc.cluster.local
                          port: 3000
                          path: /
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  calibre:
                    name: "Calibre"
                    mode: http
                    full-domain: books.calebbrown.dev
                    targets:
                      - hostname: calibre.calibre.svc.cluster.local
                        port: 8080
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: calibre.calibre.svc.cluster.local
                          port: 8080
                          path: /
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  audiobookshelf:
                    name: "Audiobookshelf"
                    mode: http
                    full-domain: audiobooks.calebbrown.dev
                    targets:
                      - hostname: audiobookshelf.audiobookshelf.svc.cluster.local
                        port: 80
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: audiobookshelf.audiobookshelf.svc.cluster.local
                          port: 80
                          path: /healthcheck
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
                  cronarch-www:
                    name: "Cronarch Website (www)"
                    mode: http
                    full-domain: www.cronarch.com
                    targets:
                      - hostname: website.website.svc.cluster.local
                        port: 3000
                        method: http
                        enabled: true
                        healthcheck:
                          enabled: true
                          scheme: http
                          hostname: website.website.svc.cluster.local
                          port: 3000
                          path: /
                          method: GET
                          status: 200
                          interval: 30000
                          timeout: 5000
                          healthy-threshold: 2
                          unhealthy-threshold: 3
  destination:
    server: https://kubernetes.default.svc
    namespace: newt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
