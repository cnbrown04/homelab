apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omni-ingress
  namespace: omni-system
  annotations:
    # NPM can forward HTTPS to Traefik :443 (websecure); use SSL "Full" if Traefik uses its default cert.
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # h2c is configured on Service omni (Omni + SideroLink API); k8s proxy uses Service omni-k8s-proxy without h2c.
spec:
  ingressClassName: traefik
  rules:
    - host: omni.calebbrown.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni
                port:
                  name: omni
    - host: omni-k8s.calebbrown.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni-k8s-proxy
                port:
                  name: k8s-proxy
    - host: omni-siderolink.calebbrown.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni
                port:
                  name: siderolink-api
