apiVersion: v1
kind: Namespace
metadata:
  name: tdarr
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tdarr-media-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4
    - hard
    - noatime
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: tdarr-media
    volumeAttributes:
      server: 10.0.1.111
      share: /mnt/styx/data/media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdarr-server-pvc
  namespace: tdarr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdarr-config-pvc
  namespace: tdarr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tdarr-transcode-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4
    - hard
    - noatime
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: tdarr-transcode
    volumeAttributes:
      server: 10.0.1.111
      share: /mnt/styx/data/media/transcode
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdarr-transcode-pvc
  namespace: tdarr
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: tdarr-transcode-pv
  resources:
    requests:
      storage: 1Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdarr-media-pvc
  namespace: tdarr
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: tdarr-media-pv
  resources:
    requests:
      storage: 1Ti
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr
  namespace: tdarr
  labels:
    app: tdarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: tdarr
    spec:
      containers:
        - name: tdarr
          image: ghcr.io/haveagitgat/tdarr:latest
          ports:
            - containerPort: 8265
              name: webui
            - containerPort: 8266
              name: server
            - containerPort: 8267
              name: node
          env:
            - name: TZ
              value: "America/Chicago"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK_SET
              value: "002"
            - name: serverIP
              value: "0.0.0.0"
            - name: serverPort
              value: "8266"
            - name: webUIPort
              value: "8265"
            - name: inContainer
              value: "true"
            - name: ffmpegVersion
              value: "6"
            - name: nodeName
              value: "tdarr-node"
          volumeMounts:
            - name: server
              mountPath: /app/server
            - name: config
              mountPath: /app/configs
            - name: logs
              mountPath: /app/logs
            - name: media
              mountPath: /media
            - name: transcode-cache
              mountPath: /temp
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 4000m
              memory: 4Gi
      volumes:
        - name: server
          persistentVolumeClaim:
            claimName: tdarr-server-pvc
        - name: config
          persistentVolumeClaim:
            claimName: tdarr-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: tdarr-media-pvc
        - name: logs
          emptyDir: {}
        - name: transcode-cache
          persistentVolumeClaim:
            claimName: tdarr-transcode-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tdarr
  namespace: tdarr
spec:
  selector:
    app: tdarr
  ports:
    - port: 8265
      targetPort: 8265
      name: webui
    - port: 8266
      targetPort: 8266
      name: server
