apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omni-ingress
  namespace: omni-system
  annotations:
    # TLS terminates at NPM; Traefik receives HTTP on the web entrypoint.
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/service.serversscheme: h2c
spec:
  ingressClassName: traefik
  rules:
    - host: omni.calebbrown.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni
                port:
                  number: 80
    - host: omni-k8s.calebbrown.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni
                port:
                  number: 80
    - host: omni-siderolink.calebbrown.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni
                port:
                  number: 80
