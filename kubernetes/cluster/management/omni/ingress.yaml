apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omni-ingress
  namespace: omni-system
  annotations:
    # NPM can forward HTTPS to Traefik :443 (websecure); use SSL "Full" if Traefik uses its default cert.
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: h2c
spec:
  ingressClassName: traefik
  rules:
    - host: omni.calebbrown.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni
                port:
                  number: 80
    - host: omni-k8s.calebbrown.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni
                port:
                  number: 80
    - host: omni-siderolink.calebbrown.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni
                port:
                  number: 80
