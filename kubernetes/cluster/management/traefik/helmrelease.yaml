apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "34.x.x" # Uses latest v34 series
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    ingressRoute:
      dashboard:
        enabled: false
    ports:
      web:
        port: 80
        hostPort: 80 # Binds to Node Port 80
      websecure:
        port: 443
        hostPort: 443 # Binds to Node Port 443
    service:
      type: ClusterIP # We use hostPort, so no need for a LoadBalancer IP
    providers:
      kubernetesIngress:
        publishedService:
          enabled: false
