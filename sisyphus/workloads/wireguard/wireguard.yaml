apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireguard
  namespace: wireguard
  labels:
    app: wireguard
spec:
  replicas: 1
  # Two pods would both dial the same Pangolin peer with the same key and fight
  # over the handshake; keep it to one and don't run old+new at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wireguard
  template:
    metadata:
      labels:
        app: wireguard
    spec:
      containers:
        - name: wireguard
          image: lscr.io/linuxserver/wireguard:latest
          securityContext:
            # NET_ADMIN: bring up wg0 + PostUp iptables. SYS_MODULE: modprobe
            # wireguard. Talos already ships the module in-kernel (KubeSpan uses
            # it), so wg-quick uses the kernel device directly; if it's ever
            # missing the container falls back to userspace wireguard-go.
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            # The WireGuard site subnet Pangolin assigned this site (/26 = 64
            # addresses, .64-.127; the pod itself is .64, services bind .65+). A
            # `local` route for it (added in postStart) makes every address in the
            # range deliverable to the HAProxy sidecar's transparent binds — that's
            # the whole gateway plumbing, no iptables. Must match the Address in the
            # wg0.conf secret.
            - name: SITE_CIDR
              value: "100.89.128.64/26"
            # No SERVERURL/PEERS on purpose: those put linuxserver into
            # config-generating "server mode". We supply Pangolin's own wg0.conf
            # from the SOPS secret, so the container just runs `wg-quick up` on it
            # and dials out to the VPS endpoint (no inbound port to expose).
          lifecycle:
            postStart:
              exec:
                # Once wg0 is up, mark the whole site subnet as locally deliverable
                # so packets for each service's tunnel IP reach the HAProxy sidecar
                # (which binds them with `transparent`). One route for the entire
                # range — adding services never touches networking again.
                command:
                  - sh
                  - -c
                  - >
                    for i in $(seq 1 60); do ip link show wg0 >/dev/null 2>&1 && break; sleep 1; done;
                    ip route replace local "$SITE_CIDR" dev wg0 || true
          volumeMounts:
            # linuxserver wants a writable /config for its templates/state.
            # emptyDir is intentional: the only real config (wg0.conf, which
            # carries the client key + Pangolin peer) is fully declared by the
            # SOPS secret below, so there is nothing worth persisting.
            - name: config
              mountPath: /config
            # Mount just the wg0.conf file into wg_confs. wg-quick reads it; it
            # may warn about 0600 perms but brings the tunnel up regardless.
            - name: wg-config
              mountPath: /config/wg_confs/wg0.conf
              subPath: wg0.conf
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
        # L4 gateway: binds each service's WG-subnet IP and TCP-proxies it to the
        # service by cluster DNS name. Config is the wg-haproxy ConfigMap (kustomize
        # configMapGenerator → hash suffix → editing it rolls the pod). Shares the
        # pod netns, so it sees wg0 and the local route the wg container installs.
        - name: haproxy
          image: haproxy:3.1-alpine
          securityContext:
            capabilities:
              # `bind ... transparent` (IP_TRANSPARENT) needs NET_ADMIN so HAProxy
              # can bind tunnel addresses that aren't assigned to the interface.
              add:
                - NET_ADMIN
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "2"
              memory: 256Mi
      volumes:
        - name: config
          emptyDir: {}
        - name: haproxy-config
          configMap:
            name: wg-haproxy
        - name: wg-config
          secret:
            # Decrypted by the sops-decrypt ArgoCD source (see
            # sisyphus/apps/workloads/wireguard.yaml). Key `wg0.conf` holds the
            # WireGuard config Pangolin generated for this client.
            secretName: wireguard-config
            defaultMode: 0600
