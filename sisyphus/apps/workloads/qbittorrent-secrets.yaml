apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qbittorrent-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/cnbrown04/homelab.git
    path: sisyphus/workloads/qbittorrent-secrets
    targetRevision: HEAD
    plugin:
      name: sops-decrypt
  destination:
    server: https://kubernetes.default.svc
    namespace: qbittorrent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
