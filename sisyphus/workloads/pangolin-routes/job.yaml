apiVersion: batch/v1
kind: Job
metadata:
  name: pangolin-blueprint-sync
  namespace: pangolin
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: apply-blueprint
          image: python:3.13-alpine
          command:
            - sh
            - -c
            - pip install --quiet --no-cache-dir pyyaml && python3 /scripts/apply.py
          env:
            - name: PANGOLIN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: pangolin-routes-secret
                  key: PANGOLIN_ENDPOINT
            - name: PANGOLIN_ORG_ID
              valueFrom:
                secretKeyRef:
                  name: pangolin-routes-secret
                  key: PANGOLIN_ORG_ID
            - name: PANGOLIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pangolin-routes-secret
                  key: PANGOLIN_API_KEY
          volumeMounts:
            - name: blueprint
              mountPath: /blueprint
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: blueprint
          configMap:
            name: pangolin-blueprint
        - name: scripts
          configMap:
            name: pangolin-apply-script
