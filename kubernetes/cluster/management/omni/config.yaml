apiVersion: v1
kind: ConfigMap
metadata:
  name: omni-config
  namespace: omni-system
data:
  omni.yaml: |
    account:
      id: "homelab"
      name: "Caleb's Homelab"
    storage:
      default:
        kind: "etcd"
        etcd:
          embedded: true
          embeddedDBPath: "/data/etcd"
          privateKeySource: "file:///etc/omni/keys/omni.asc"
      sqlite:
        path: "/data/omni-secondary.db"
    # Omni requires an enabled identity provider (Auth0, OIDC, or SAML).
    # initialUsers only seeds admin users after IdP login works; it is not enough alone.
    # See: https://docs.siderolabs.com/omni/self-hosted/omni-configuration-example
    auth:
      initialUsers:
        - "caleb@cronarch.com"
      auth0:
        enabled: false
    services:
      api:
        advertisedURL: "https://omni.scylla.calebbrown.dev"
      machineAPI:
        advertisedURL: "https://omni-siderolink.scylla.calebbrown.dev"
      kubernetesProxy:
        advertisedURL: "https://omni-k8s.scylla.calebbrown.dev"
