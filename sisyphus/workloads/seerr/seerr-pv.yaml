apiVersion: v1
kind: PersistentVolume
metadata:
  name: seerr-media-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4
    - hard
    - noatime
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: seerr-media
    volumeAttributes:
      server: 10.0.1.111
      share: /mnt/styx/data/media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerr-media-pvc
  namespace: seerr
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: seerr-media-pv
  resources:
    requests:
      storage: 1Ti
