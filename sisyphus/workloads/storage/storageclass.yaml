apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-config
provisioner: nfs.csi.k8s.io
parameters:
  server: 10.0.1.111
  share: /mnt/styx/data/config
  subDir: ${pvc.metadata.namespace}
  onDeletePolicy: retain
mountOptions:
  - nfsvers=4
  - hard
  - noatime
reclaimPolicy: Retain
volumeBindingMode: Immediate
