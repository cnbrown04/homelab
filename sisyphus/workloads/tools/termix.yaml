apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: termix-data-pvc
  namespace: tools
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-config
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: termix
  namespace: tools
  labels:
    app: termix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: termix
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: termix
    spec:
      containers:
        - name: termix
          image: ghcr.io/lukegus/termix:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: termix-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: termix
  namespace: tools
spec:
  selector:
    app: termix
  ports:
    - port: 8080
      targetPort: 8080
