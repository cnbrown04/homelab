apiVersion: apps/v1
kind: Deployment
metadata:
  name: termix
  namespace: termix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: termix
  template:
    metadata:
      labels:
        app: termix
    spec:
      containers:
        - name: termix
          image: ghcr.io/lukegus/termix:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          volumeMounts:
            - name: data
              mountPath: /app/data
        - name: guacd
          image: guacamole/guacd:1.6.0
          ports:
            - containerPort: 4822
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: termix-data-pvc
