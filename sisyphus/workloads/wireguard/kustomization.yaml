apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Needed so the generated ConfigMap lands in the wireguard namespace too —
# otherwise its namespace differs from the Deployment's and kustomize won't
# rewrite the hashed name reference, leaving the volume pointing at a name that
# doesn't exist. (Cluster-scoped namespace.yaml is unaffected.)
namespace: wireguard
resources:
  - namespace.yaml
  - wireguard.yaml

# HAProxy gateway config. The hash suffix means editing haproxy.cfg changes the
# ConfigMap name, which rolls the wireguard Deployment automatically — so adding
# a service (a frontend/backend block) redeploys the proxy with no manual restart.
configMapGenerator:
  - name: wg-haproxy
    files:
      - haproxy.cfg
