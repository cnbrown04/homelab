apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wireguard
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/cnbrown04/homelab.git
      targetRevision: HEAD
      path: sisyphus/workloads/wireguard
    # The wg0.conf (client key + Pangolin peer) lives here as a SOPS-encrypted
    # Secret, decrypted at sync time by the sops-decrypt plugin. This MUST be a
    # sibling dir, not nested under the workload dir: the CMP's discover glob is
    # recursive (**/*.enc.yaml), so an .enc.yaml anywhere beneath the workload
    # path would make ArgoCD detect that whole source as the plugin instead of
    # Kustomize and silently drop the Deployment. Same pattern as qbittorrent-secrets.
    - repoURL: https://github.com/cnbrown04/homelab.git
      targetRevision: HEAD
      path: sisyphus/workloads/wireguard-secrets
      plugin:
        name: sops-decrypt
  destination:
    server: https://kubernetes.default.svc
    namespace: wireguard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
