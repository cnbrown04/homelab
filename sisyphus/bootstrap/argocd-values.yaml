global:
  domain: argocd.calebbrown.dev

server:
  insecure: true

configs:
  params:
    server.insecure: "true"
  cmp:
    create: true
    plugins:
      sops-decrypt:
        version: v1.0
        generate:
          command:
            - sh
            - -c
            - |
              for f in *.enc.yaml; do
                [ -f "$f" ] || continue
                /usr/local/bin/sops --decrypt "$f"
                printf '\n---\n'
              done
        discover:
          find:
            glob: "**/*.enc.yaml"

repoServer:
  serviceAccount:
    automountServiceAccountToken: true
  volumes:
    - name: sops-age-key
      secret:
        secretName: sops-age-key
    - name: custom-tools
      emptyDir: {}
    - name: cmp-tmp
      emptyDir: {}
    - name: argocd-cmp-cm
      configMap:
        name: argocd-cmp-cm
  initContainers:
    - name: download-sops
      image: alpine:3
      command:
        - sh
        - -c
        - |
          wget -qO /custom-tools/sops \
            https://github.com/getsops/sops/releases/download/v3.9.1/sops-v3.9.1.linux.amd64
          chmod +x /custom-tools/sops
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools
  extraContainers:
    - name: sops-plugin
      command: [/var/run/argocd/argocd-cmp-server]
      image: quay.io/argoproj/argocd:v3.4.3
      env:
        - name: SOPS_AGE_KEY_FILE
          value: /sops/age/keys.txt
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      volumeMounts:
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          name: argocd-cmp-cm
          subPath: sops-decrypt.yaml
        - mountPath: /sops/age
          name: sops-age-key
          readOnly: true
        - mountPath: /tmp
          name: cmp-tmp
        - mountPath: /usr/local/bin/sops
          name: custom-tools
          subPath: sops
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
