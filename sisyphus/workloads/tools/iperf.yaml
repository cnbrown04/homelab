apiVersion: apps/v1
kind: Deployment
metadata:
  name: iperf
  namespace: tools
  labels:
    app: iperf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iperf
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: iperf
    spec:
      containers:
        - name: openssh-server
          image: lscr.io/linuxserver/openssh-server:latest
          ports:
            - containerPort: 2222
            - containerPort: 5201
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            - name: USER_NAME
              value: caleb
            - name: PASSWORD_ACCESS
              value: "false"
            - name: SUDO_ACCESS
              value: "true"
            - name: PUBLIC_KEY
              value: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIP88BOfNMfJoF99u1UYpf3CDUGl5nv+Ovbh0B8fyaqTH caleb@auburn.edu"
            - name: DOCKER_MODS
              value: linuxserver/mods:universal-package-install
            - name: INSTALL_PACKAGES
              value: iperf3|iproute2|bind-tools|mtr|curl|tcpdump
          volumeMounts:
            - name: config
              mountPath: /config
          # Without this the pod reports Ready as soon as the container starts,
          # while the package-install mod still runs and sshd isn't listening —
          # the Service then routes to a closed port and ArgoCD calls it healthy.
          readinessProbe:
            tcpSocket:
              port: 2222
            initialDelaySeconds: 10
            periodSeconds: 5
          # iperf3 is CPU-bound: a low limit throttles the test itself and
          # understates tunnel throughput. Keep headroom above line rate.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "4"
              memory: 512Mi
      volumes:
        # Not an NFS PVC: sshd refuses to start if it can't own its host keys,
        # and the nfs-config share won't allow the chown. Host keys regenerate
        # on restart, so Termix will flag a changed key after a redeploy.
        - name: config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: iperf
  namespace: tools
spec:
  selector:
    app: iperf
  ports:
    - name: ssh
      port: 2222
      targetPort: 2222
    # Newt dials the ClusterIP on 5201 for the iperf blueprint resource; without
    # this the Service refuses the connection even though iperf3 -s is listening.
    - name: iperf
      port: 5201
      targetPort: 5201
