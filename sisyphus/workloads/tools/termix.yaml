apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: termix-data-pvc
  namespace: tools
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-config
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: termix
  namespace: tools
  labels:
    app: termix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: termix
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: termix
    spec:
      # Termix 2.5.1 added a pre-migration step that mkdir's /app/data/backups.
      # The data dir is on the nfs-config NFS share; the Termix process can update
      # its existing sqlite files but can't create new dirs there (EACCES), so it
      # crashes on startup. Make the tree writable first. Runs as root to cover
      # whatever uid the NFS subdir is owned by.
      initContainers:
        - name: fix-perms
          image: busybox:1.37
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - mkdir -p /app/data/backups && chmod -R 0777 /app/data
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: termix
          image: ghcr.io/lukegus/termix:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GUACD_HOST
              value: "termix.tools.svc.cluster.local"
            - name: GUACD_PORT
              value: "4822"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
        - name: guacd
          image: guacamole/guacd:1.6.0
          ports:
            - containerPort: 4822
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: termix-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: termix
  namespace: tools
spec:
  selector:
    app: termix
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: guacd
      port: 4822
      targetPort: 4822
