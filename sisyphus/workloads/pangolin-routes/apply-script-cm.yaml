apiVersion: v1
kind: ConfigMap
metadata:
  name: pangolin-apply-script
  namespace: pangolin
data:
  apply.py: |
    import os, json, yaml, base64, urllib.request, urllib.error, sys

    endpoint = os.environ["PANGOLIN_ENDPOINT"].rstrip("/")
    org_id = os.environ["PANGOLIN_ORG_ID"]
    api_key = os.environ["PANGOLIN_API_KEY"]

    with open("/blueprint/blueprint.yaml") as f:
        data = yaml.safe_load(f)

    b64 = base64.b64encode(json.dumps(data).encode()).decode()
    body = json.dumps({"blueprint": b64}).encode()
    url = f"{endpoint}/api/v1/org/{org_id}/blueprint"

    req = urllib.request.Request(url, data=body, method="PUT")
    req.add_header("Content-Type", "application/json")
    req.add_header("x-api-key", api_key)

    try:
        with urllib.request.urlopen(req) as resp:
            print(f"Blueprint applied: HTTP {resp.status}")
            print(resp.read().decode())
    except urllib.error.HTTPError as e:
        print(f"Error {e.code}: {e.read().decode()}", file=sys.stderr)
        sys.exit(1)
