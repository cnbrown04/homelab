apiVersion: v1
kind: ConfigMap
metadata:
  name: gluetun-scripts
  namespace: qbittorrent
data:
  port-up.sh: |
    #!/bin/sh
    wget -O- -nv --retry-connrefused \
      --post-data "json={\"listen_port\":$1,\"current_network_interface\":\"$2\",\"random_port\":false,\"upnp\":false}" \
      http://127.0.0.1:8080/api/v2/app/setPreferences || true
  port-down.sh: |
    #!/bin/sh
    wget -O- -nv --retry-connrefused \
      --post-data "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}" \
      http://127.0.0.1:8080/api/v2/app/setPreferences || true
