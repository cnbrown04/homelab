apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: termix
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cnbrown04/homelab.git
    targetRevision: HEAD
    path: sisyphus/workloads/termix
  destination:
    server: https://kubernetes.default.svc
    namespace: termix
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
