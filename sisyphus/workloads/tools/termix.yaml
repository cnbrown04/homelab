apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: termix-data-pvc
  namespace: tools
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-config
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: termix
  namespace: tools
  labels:
    app: termix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: termix
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: termix
    spec:
      # Termix 2.5.1 added a startup step that mkdir's a pre-migration backup dir
      # under /app/data (on the nfs-config NFS share) and crashes if it can't.
      # Just ensure that dir exists. Do NOT chmod -R the tree: the share is
      # root_squash, so this container is mapped to `nobody` and cannot chmod the
      # uid-1000-owned files Termix wrote earlier — that returns EPERM and would
      # crash-loop the init container. /app/data is already 0777, so the mkdir
      # (and any Termix write) succeeds regardless; `true` keeps the step green.
      initContainers:
        - name: ensure-backups-dir
          image: busybox:1.37
          command:
            - sh
            - -c
            - mkdir -p /app/data/backups; true
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: termix
          image: ghcr.io/lukegus/termix:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GUACD_HOST
              value: "termix.tools.svc.cluster.local"
            - name: GUACD_PORT
              value: "4822"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
        - name: guacd
          image: guacamole/guacd:1.6.0
          ports:
            - containerPort: 4822
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: termix-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: termix
  namespace: tools
spec:
  selector:
    app: termix
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: guacd
      port: 4822
      targetPort: 4822
