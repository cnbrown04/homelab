---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: omni-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /var/mnt/omni-data # This is a safe path on Talos nodes
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omni-data
  namespace: omni-system
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
