apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni
  namespace: omni-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: omni
  template:
    metadata:
      labels:
        app: omni
    spec:
      securityContext:
        runAsUser: 0
      containers:
        - name: omni
          image: ghcr.io/siderolabs/omni:latest # Updated to latest
          args:
            - "--config-path=/etc/omni/config/omni.yaml"
          ports:
            - containerPort: 8080
              name: web
            - containerPort: 8081
              name: api
          volumeMounts:
            - name: data
              mountPath: /data
            - name: keys
              mountPath: /etc/omni/keys
              readOnly: true
            - name: config
              mountPath: /etc/omni/config
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: omni-data
        - name: keys
          secret:
            secretName: omni-keys
        - name: config
          configMap:
            name: omni-config
